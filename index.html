<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio 07</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 4. Encabezado y párrafo -->
    <h1>Bienvenido al Laboratorio 07</h1>
    <p>Este es un párrafo de ejemplo para demostrar los estilos básicos.</p>
    <!-- 5. Párrafo con clase "titulo" -->
    <p class="titulo">Este es un párrafo con la clase título</p>
    <!-- 6. Caja con fondo amarillo -->
    <div class="caja">
        Esta es una caja con fondo amarillo, borde azul, padding y margin
    </div>
    <!-- 7. Elemento único -->
    <p id="unico">Este es un párrafo único con estilos especiales</p>
    <!-- 8. Botón independiente -->
    <button class="boton">Haz clic aquí</button>
    <!-- 9 y 10. Contenedor con clases combinadas -->
    <div class="contenedor borde fondo-redondeado sombra">
        Este es un contenedor con estilos combinados.
    </div>
</body>
</html>
